name: Souhait ou remarque — recette client
description: Julien — utilise ce formulaire pour me remonter un souhait ou une remarque suite à ta recette du site
title: "[RECETTE] "
labels: ["type: recette-client", "statut: à faire", "lot: 5 - recette"]
assignees: ["estoclet"]

body:
  - type: markdown
    attributes:
      value: |
        **Bonjour Julien !**

        Utilise ce formulaire pour me signaler tout ce que tu observes lors de ta recette : quelque chose qui ne fonctionne pas comme prévu, un texte à corriger, un affichage qui ne te convient pas, ou une idée d'amélioration.

        **Pas besoin d'être technique** — décris simplement ce que tu vois et ce que tu attends.

  - type: dropdown
    id: nature
    attributes:
      label: De quoi s'agit-il ?
      options:
        - "🐛 Quelque chose ne fonctionne pas"
        - "✏️ Texte ou contenu à corriger"
        - "🎨 Problème d'affichage ou de mise en page"
        - "💡 Souhait d'amélioration ou d'ajout"
        - "❓ Question sur le fonctionnement"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: C'est urgent pour toi ?
      options:
        - "Oui, c'est bloquant — je ne peux pas valider sans cette correction"
        - "C'est important mais je peux continuer la recette"
        - "C'est une petite chose, à traiter quand c'est possible"
    validations:
      required: true

  - type: input
    id: page
    attributes:
      label: Sur quelle page ou section ?
      description: Nom de la page ou adresse URL du site concerné
      placeholder: "Page d'accueil, section Contact, menu principal, page Prestations…"
    validations:
      required: true

  - type: textarea
    id: observed
    attributes:
      label: Ce que tu observes actuellement
      description: Décris ce que tu vois sur le site, le plus précisément possible
      placeholder: |
        Exemple : "En cliquant sur le bouton 'Prendre rendez-vous' depuis mon iPhone, il ne se passe rien."
        Exemple : "Le texte de la carte 'Réseau & Wi-Fi' contient une faute de frappe."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Ce que tu souhaites à la place
      description: Décris ce que tu attends ou ce que tu préférerais
      placeholder: |
        Exemple : "Je voudrais que le bouton ouvre directement le formulaire de contact."
        Exemple : "Je voudrais que la couleur du bouton soit plus foncée pour mieux le voir."
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Captures d'écran — facultatif mais très utile
      description: |
        Tu peux glisser-déposer tes captures directement dans cette zone.

        Sur iPhone : bouton latéral + volume haut simultanément.
        Sur Mac : Cmd + Maj + 4 pour faire une sélection.

  - type: textarea
    id: context
    attributes:
      label: Appareil et navigateur utilisés — facultatif
      placeholder: |
        Exemple : "iPhone 15, Safari"
        Exemple : "MacBook Air, Chrome"
        Exemple : "iPad, Safari, orienté en mode paysage"
